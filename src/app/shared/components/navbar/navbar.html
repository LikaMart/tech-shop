<nav class="navbar">
  <div class="container">
    <a routerLink="/home" class="logo">Tech<span>Shop</span></a>

    <input type="checkbox" id="burger-toggle" class="burger-toggle" />
    <label for="burger-toggle" class="burger">
      <span></span>
      <span></span>
      <span></span>
    </label>

    <ul class="nav-links">
      <li><a routerLink="/home" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">მთავარი</a></li>
      <li><a routerLink="/about" routerLinkActive="active">ჩვენს შესახებ</a></li>

      @if (auth.isLoggedIn()) {
        <li><a routerLink="/cart" routerLinkActive="active">🛒 კალათა ({{ cart.totalItems() }})</a></li>
        <li><button (click)="auth.signOut()">გასვლა</button></li>
      } @else {
        <li><a routerLink="/login" routerLinkActive="active">შესვლა</a></li>
        <li><a routerLink="/register" routerLinkActive="active" class="btn-primary">რეგისტრაცია</a></li>
      }
    </ul>
  </div>
</nav>
