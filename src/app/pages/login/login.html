<div class="login-wrapper">
  <div class="login-card">
    <h2>შესვლა</h2>
    <p class="subtitle">გამარჯობა! შედი შენს ანგარიშზე</p>

    <form #loginForm="ngForm" (ngSubmit)="submit()">
      <div class="form-group">
        <label for="email">მეილი</label>
        <input
          type="email"
          id="email"
          name="email"
          [(ngModel)]="email"
          required
          email
          #emailField="ngModel"
          placeholder="example@gmail.com"
        />
        @if (emailField.invalid && emailField.touched) {
          <span class="error-msg">სწორი მეილი შეიყვანეთ</span>
        }
      </div>

      <div class="form-group">
        <label for="password">პაროლი</label>
        <input
          type="password"
          id="password"
          name="password"
          [(ngModel)]="password"
          required
          #passwordField="ngModel"
          placeholder="••••••••"
        />
        @if (passwordField.invalid && passwordField.touched) {
          <span class="error-msg">პაროლი სავალდებულოა</span>
        }
      </div>

      @if (error()) {
        <p class="error-msg">{{ error() }}</p>
      }

      <button type="submit" [disabled]="isLoading() || loginForm.invalid">
        {{ isLoading() ? 'იტვირთება...' : 'შესვლა' }}
      </button>
    </form>

    <p class="switch-link">
      ანგარიში არ გაქვს?
      <a routerLink="/register">დარეგისტრირდი</a>
    </p>
  </div>
</div>
